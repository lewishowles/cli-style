name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:unit

  publish-npm:
    name: Publish npm package
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --provenance --access public

  release-binaries:
    name: Release binary tarballs
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - platform: darwin
            architecture: arm64
          - platform: darwin
            architecture: x64
          - platform: linux
            architecture: arm64
          - platform: linux
            architecture: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package binary
        env:
          CLI_STYLE_PLATFORM: ${{ matrix.platform }}
          CLI_STYLE_ARCH: ${{ matrix.architecture }}
        run: bun run package:binary

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.tar.gz
